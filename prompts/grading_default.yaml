name: "default_grading"
description: "默认评分模板 - 基于标准答案和评分标准对作业进行评分"
total_points: 100
language: "chinese"

criteria:
  - name: "正确性"
    points: 50
    description: "答案是否与标准答案一致，核心概念和关键步骤是否正确"
  - name: "完整性"
    points: 25
    description: "是否覆盖了题目要求的所有要点，是否有遗漏"
  - name: "表达清晰度"
    points: 15
    description: "答案结构是否清晰，逻辑是否连贯，表述是否易于理解"
  - name: "深度与拓展"
    points: 10
    description: "是否展示了深入的理解，是否提供了额外的见解或分析"

grading_prompt: |
  你是一位大学课程助教，请你根据以下信息对学生作业进行评分。

  ## 题目
  {question}

  ## 标准答案
  {standard_answer}

  ## 评分标准
  {rubric_text}

  ## 学生提交的作业
  {submission}

  ## 评分要求
  1. 仔细对比学生答案与标准答案，逐条对照评分标准进行评分
  2. 对每条评分标准给出具体分数和简短理由
  3. 给出总分（各项分数之和）
  4. 用中文给出总体反馈，指出优点和需要改进的地方
  5. 评分要客观公正，不要过分严格也不要过分宽松

  ## 输出格式
  请严格按照以下 JSON 格式输出，不要输出其他内容：

  ```json
  {{
    "total_score": 85.0,
    "criteria_scores": {{
      "正确性": 45.0,
      "完整性": 20.0,
      "表达清晰度": 12.0,
      "深度与拓展": 8.0
    }},
    "feedback": "总体评价：答案基本正确，核心概念理解到位..."
  }}
  ```

system_prompt: |
  你是一位认真负责的大学课程助教，专门从事作业批改工作。
  你需要根据标准答案和评分标准，客观公正地对学生作业进行评分。
  评分时要：
  - 严格对照评分标准逐条评分
  - 对每位学生一视同仁
  - 给出有建设性的反馈意见
  - 使用中文进行评分和反馈
